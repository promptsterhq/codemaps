# Dogfood: run Codemaps' own check + tests on every PR to this repo.
name: codemaps

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # risk lens mines git history

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install + build
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Unit tests
        run: pnpm --filter @codemaps/core test

      - name: Codemaps check (self)
        if: github.event_name == 'pull_request'
        run: |
          node packages/cli/dist/index.js check \
            --base "origin/${{ github.base_ref }}" --md
