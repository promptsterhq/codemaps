# Enforce the DCO sign-off CONTRIBUTING.md promises: every PR commit must
# carry a Signed-off-by trailer. No third-party action — a range check is
# all this needs.
name: dco

on:
  pull_request:

jobs:
  signoff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check Signed-off-by on every PR commit
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          missing=0
          while read -r sha; do
            if ! git log -1 --format=%B "$sha" | grep -qi '^Signed-off-by: .\+<.\+@.\+>'; then
              echo "::error::commit $sha is missing a Signed-off-by trailer (use: git commit -s)"
              missing=1
            fi
          done < <(git rev-list "$base".."$head")
          exit "$missing"
